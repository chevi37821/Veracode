# ============================================================
# VERACODE PIPELINE SCAN + FIX — GitHub Actions
# Escaneo SAST + guardado de resultados + fixes automáticos con IA
# ============================================================
#sin autopackager
name: Veracode Pipeline Scan

# ─────────────────────────────────────────────
# TRIGGERS — Cuándo se ejecuta este workflow
# ─────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]        # Se dispara en push a main o master
  pull_request:
    branches: [ main, master ]        # Se dispara en PRs hacia main o master

# ─────────────────────────────────────────────
# PERMISOS — Necesarios para que Veracode Fix
# pueda crear Pull Requests automáticos
# ─────────────────────────────────────────────
permissions:
  contents: write                     # Permite escribir en el repositorio
  pull-requests: write                # Permite crear y comentar Pull Requests

jobs:

  # ══════════════════════════════════════════
  # JOB 1: BUILD
  # Compila el código Java con Maven
  # y genera el artefacto .war
  # ══════════════════════════════════════════
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clona el repositorio en el runner
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Instala Java 11 en el runner
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 3: Compila el proyecto con Maven
      # working-directory apunta a la carpeta app/
      # donde está el pom.xml del proyecto
      - name: Build con Maven
        working-directory: ./app
        run: mvn -B clean package --file pom.xml -DskipTests

      # Paso 4: Verifica los artefactos generados
      # Útil para confirmar el nombre del .war
      - name: Verificar artefactos generados
        run: find ./app/target -name "*.war" -o -name "*.jar" | head -20

      # Paso 5: Sube el .war como artefacto
      # para que los jobs siguientes puedan descargarlo
      # Usamos *.war para no depender del nombre exacto
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: verademo-artifact
          path: ./app/target/*.war

  # ══════════════════════════════════════════
  # JOB 2: VERACODE SCAN
  # Descarga el .war y lo envía a Veracode
  # para análisis estático (SAST)
  # ══════════════════════════════════════════
  veracode-scan:
    needs: build                      # Espera que build termine exitosamente
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descarga el .war subido por el job build
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: verademo-artifact

      # Paso 2: Lista archivos para confirmar
      # que el .war llegó correctamente
      - name: Listar archivos descargados
        run: ls -la

      # Paso 3: Instala Java 11
      # Cada job corre en runner limpio — se reinstala Java
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 4: Ejecuta el Pipeline Scan de Veracode
      # --json_output_file: guarda todos los findings
      # --filtered_json_output_file: guarda solo los que violan la política
      # || true: permite continuar aunque haya findings bloqueantes
      - name: Veracode Pipeline Scan
        env:
          VID: ${{ secrets.VID }}     # API ID de Veracode
          VKEY: ${{ secrets.VKEY }}   # API Secret Key de Veracode
        run: |
          echo '[INFO] Descargando Pipeline Scanner...'
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip pipeline-scan-LATEST.zip

          # Detecta el nombre del .war dinámicamente
          # Esto hace el YAML reutilizable en cualquier proyecto Java
          WAR_FILE=$(ls *.war)
          echo "[INFO] Artefacto a escanear: $WAR_FILE"

          echo '[INFO] Ejecutando Pipeline Scan...'
          java -jar pipeline-scan.jar \
            -vid "$VID" \
            -vkey "$VKEY" \
            --file "$WAR_FILE" \
            --project_name "$GITHUB_REPOSITORY" \
            --project_url "https://github.com/$GITHUB_REPOSITORY" \
            --fail_on_severity "Very High, High" \
            --json_output_file results.json \
            --filtered_json_output_file filtered_results.json || true

          echo '[INFO] Verificando archivos generados...'
          ls -la *.json || echo '[WARN] No se generaron archivos JSON'

          # Si filtered_results.json no existe, copiar results.json
          # La action veracode-fix busca filtered_results.json internamente
          if [ ! -f filtered_results.json ]; then
            echo '[INFO] Copiando results.json como filtered_results.json...'
            cp results.json filtered_results.json
          fi

          echo '[INFO] Pipeline Scan completado.'

      # Paso 5: Guarda ambos archivos de resultados como artefacto
      # if: always() garantiza que se guarden aunque el scan falle
      # results.json: todos los findings encontrados
      # filtered_results.json: solo los que violan la política
      - name: Guardar resultados del scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-scan-results
          path: |
            results.json
            filtered_results.json

  # ══════════════════════════════════════════
  # JOB 3: VERACODE FIX
  # Usa IA para generar fixes automáticos
  # de los flaws encontrados en el scan
  # Crea un Pull Request con los cambios
  # ══════════════════════════════════════════
  veracode-fix:
    needs: veracode-scan              # Espera que el scan termine
    runs-on: ubuntu-latest
    if: always()                      # Corre aunque el scan haya fallado
                                      # porque necesitamos los resultados

    steps:
      # Paso 1: Clona el repositorio
      # Veracode Fix necesita el código fuente
      # para aplicar los parches generados por IA
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Descarga los resultados del scan
      # Incluye results.json y filtered_results.json
      - name: Descargar resultados del scan
        uses: actions/download-artifact@v4
        with:
          name: veracode-scan-results

      # Paso 3: Verificar que los archivos existen
      # antes de pasárselos a Veracode Fix
      - name: Verificar archivos de resultados
        run: |
          echo '[INFO] Archivos disponibles:'
          ls -la
          # Si filtered_results.json no llegó, crear uno desde results.json
          if [ ! -f filtered_results.json ]; then
            echo '[INFO] Creando filtered_results.json desde results.json...'
            cp results.json filtered_results.json
          fi

      # Paso 4: Ejecuta Veracode Fix
      # Genera parches de código con IA para cada flaw
      # fixType: batch = un solo PR con todos los fixes juntos
      # createPR: true = crea PR automático con el código corregido
      # prComment: true = agrega comentarios en el PR con los fixes
      - name: Veracode Fix
        uses: veracode/veracode-fix@main
        with:
          vid: ${{ secrets.VID }}           # API ID de Veracode
          vkey: ${{ secrets.VKEY }}         # API Secret Key de Veracode
          token: ${{ secrets.GITHUB_TOKEN }} # Token de GitHub para crear el PR
          inputFile: filtered_results.json  # Archivo con los findings a corregir
          fixType: batch                    # batch: un PR con todos los fixes juntos
          files: all                        # Analiza todos los archivos con findings
          prComment: true                   # Agrega comentarios en el PR con los fixes
          createPR: true                    # Crea un PR automático con los cambios

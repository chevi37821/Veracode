# ============================================================
# VERACODE PIPELINE SCAN — GitHub Actions
# Escaneo SAST con Veracode CLI Autopackager
# El autopackager detecta el lenguaje, compila y empaqueta
# automáticamente. Para Java ejecuta Maven internamente.
# ============================================================

name: Veracode Pipeline Scan + autopackage

# ─────────────────────────────────────────────
# TRIGGERS — Cuándo se ejecuta este workflow
# ─────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# ─────────────────────────────────────────────
# PERMISOS
# ─────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: read

# ─────────────────────────────────────────────
# FIX: Permite Node.js 20 en las actions
# GitHub forzará Node.js 24 desde septiembre 2026
# ─────────────────────────────────────────────
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  # ══════════════════════════════════════════
  # JOB 1: AUTOPACKAGE
  # Veracode CLI detecta el lenguaje del proyecto
  # y lo empaqueta automáticamente.
  # Para Java: ejecuta Maven internamente y genera .war
  # Para JS/Python/Go: empaqueta los archivos directamente
  # ══════════════════════════════════════════
  autopackage:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clona el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Instala Java 11
      # Requerido para que el autopackager pueda ejecutar
      # Maven internamente al detectar un proyecto Java
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 3: Instala el Veracode CLI
      # Incluye el autopackager con soporte para múltiples lenguajes:
      # Java (Maven/Gradle), .NET, JS, Python, Go, Ruby, PHP, SQL, etc.
      - name: Instalar Veracode CLI
        run: |
          echo '[INFO] Descargando Veracode CLI...'
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          ./veracode version
          echo '[INFO] Veracode CLI instalado correctamente.'

      # Paso 4: Diagnóstico del proyecto
      # Detecta los toolchains disponibles en el repositorio
      # Genera o actualiza veracode.yml con los módulos detectados
      # SIEMPRE ejecutar antes de veracode package
      - name: Veracode Package Discover
        run: |
          echo '[INFO] Detectando toolchains del proyecto...'
          ./veracode package discover
          echo '[INFO] Diagnóstico completado.'

      # Paso 5: Empaqueta el proyecto automáticamente
      # --source .: empaqueta desde el directorio raíz
      # --trust: confirma que el código es de confianza
      # --output ./dist: carpeta de salida de artefactos
      # --verbose: muestra detalles del proceso
      # Para Java genera: verademo.war (26.8MB)
      # Para JS genera: veracode-auto-pack-{proyecto}-js-no-pm.zip
      # Para SQL genera: veracode-auto-pack-{proyecto}-sql.zip
      - name: Veracode Autopackage
        run: |
          echo '[INFO] Empaquetando proyecto...'
          ./veracode package \
            --source . \
            --trust \
            --output ./dist \
            --verbose
          echo '[INFO] Artefactos generados por el autopackager:'
          ls -la ./dist/

      # Paso 6: Sube los artefactos para el job de scan
      # Sube el .war de Java y los .zip de otros lenguajes
      # El job veracode-scan los descargará en el siguiente job
      - name: Subir artefactos
        uses: actions/upload-artifact@v4
        with:
          name: veracode-autopack-artifact
          path: |
            ./dist/verademo.war
            ./dist/*.zip

  # ══════════════════════════════════════════
  # JOB 2: VERACODE PIPELINE SCAN
  # Descarga los artefactos y los envía a Veracode
  # Prioriza .war para proyectos Java
  # Si no hay .war busca el .zip del autopackager
  # ══════════════════════════════════════════
  veracode-scan:
    needs: autopackage                # Espera que autopackage termine
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descarga los artefactos del job anterior
      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          name: veracode-autopack-artifact

      # Paso 2: Lista archivos descargados para diagnóstico
      - name: Listar archivos descargados
        run: |
          echo '[INFO] Archivos disponibles para escanear:'
          ls -la

      # Paso 3: Instala Java para ejecutar pipeline-scan.jar
      # Cada job corre en runner limpio — Java se reinstala
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 4: Ejecuta el Pipeline Scan de Veracode
      # Prioriza .war sobre .zip para proyectos Java
      # Si existe .war lo usa — si no, busca el .zip del autopackager
      # --fail_on_severity: bloquea el pipeline si encuentra
      #   Very High o High — quitar esta línea para modo pasivo
      - name: Veracode Pipeline Scan
        env:
          VID: ${{ secrets.VID }}     # API ID de Veracode
          VKEY: ${{ secrets.VKEY }}   # API Secret Key de Veracode
        run: |
          echo '[INFO] Descargando Pipeline Scanner...'
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip pipeline-scan-LATEST.zip

          echo '[INFO] Archivos disponibles:'
          ls -la

          # Detectar el artefacto a escanear
          # Prioridad 1: .war (Java compilado — más completo para SAST)
          # Prioridad 2: .zip del autopackager (otros lenguajes)
          if ls *.war 1>/dev/null 2>&1; then
            SCAN_FILE=$(ls *.war | head -1)
            echo "[INFO] Artefacto Java WAR detectado: $SCAN_FILE"
          else
            SCAN_FILE=$(ls *.zip | grep -v "pipeline-scan" | head -1)
            echo "[INFO] Artefacto ZIP detectado: $SCAN_FILE"
          fi

          # Validar que se encontró un artefacto antes de escanear
          if [ -z "$SCAN_FILE" ]; then
            echo '[ERROR] No se encontró artefacto para escanear'
            echo '[ERROR] Verificar que el job autopackage generó artefactos'
            exit 1
          fi

          echo "[INFO] Escaneando: $SCAN_FILE"

          echo '[INFO] Ejecutando Pipeline Scan...'
          # --json_output_file: guarda todos los findings
          # --filtered_json_output_file: solo los que violan la política
          java -jar pipeline-scan.jar \
            -vid "$VID" \
            -vkey "$VKEY" \
            --file "$SCAN_FILE" \
            --project_name "$GITHUB_REPOSITORY" \
            --project_url "https://github.com/$GITHUB_REPOSITORY" \
            --fail_on_severity "Very High, High" \
            --json_output_file results.json \
            --filtered_json_output_file filtered_results.json

          echo '[INFO] Verificando archivos JSON generados...'
          ls -la *.json || echo '[WARN] No se generaron archivos JSON'
          echo '[INFO] Pipeline Scan completado.'

          # ─────────────────────────────────────────
          # CÓDIGOS DE SALIDA (EXIT CODES):
          # 0  → Sin findings bloqueantes → pipeline continúa ✅
          # 16 → N findings bloqueantes encontrados → pipeline falla ❌
          # 1  → Error de configuración o autenticación ❌
          # ─────────────────────────────────────────

      # Paso 5: Guarda resultados como artefacto descargable
      # if: always() garantiza guardado aunque el scan falle
      # results.json: todos los findings encontrados
      # filtered_results.json: solo los que violan la política
      - name: Guardar resultados del scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-scan-results
          path: |
            results.json
            filtered_results.json

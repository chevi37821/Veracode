# ============================================================
# VERACODE PIPELINE SCAN — GitHub Actions
# Escaneo SAST con Veracode CLI Autopackager
# Java/Maven: requiere build previo antes del autopackager
# El autopackager empaqueta correctamente para Veracode
# ============================================================

name: Veracode Pipeline Scan + autopackage

# ─────────────────────────────────────────────
# TRIGGERS — Cuándo se ejecuta este workflow
# ─────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]        # Se dispara en push a main o master
  pull_request:
    branches: [ main, master ]        # Se dispara en PRs hacia main o master

# ─────────────────────────────────────────────
# PERMISOS
# ─────────────────────────────────────────────
permissions:
  contents: read
  pull-requests: read

# ─────────────────────────────────────────────
# FIX: Permite Node.js 20 en las actions
# GitHub forzará Node.js 24 desde septiembre 2026
# ─────────────────────────────────────────────
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:

  # ══════════════════════════════════════════
  # JOB 1: BUILD + AUTOPACKAGE
  # Para Java/Maven el autopackager necesita
  # el .war compilado para detectarlo correctamente
  # Flujo: Maven compila → autopackager empaqueta
  # ══════════════════════════════════════════
  autopackage:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clona el repositorio
      - name: Checkout código
        uses: actions/checkout@v4

      # Paso 2: Instala Java 11
      # Requerido para compilar con Maven
      # Java/Maven NO compila solo con el autopackager —
      # se necesita el .war generado antes de empaquetar
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 3: Compila el proyecto con Maven
      # Genera el .war en app/target/
      # Este paso es OBLIGATORIO para Java —
      # sin él el autopackager solo encuentra JS
      - name: Build con Maven
        working-directory: ./app
        run: mvn -B clean package --file pom.xml -DskipTests

      # Paso 4: Verifica que el .war fue generado
      - name: Verificar build
        run: |
          echo '[INFO] Artefactos generados por Maven:'
          find ./app/target -name "*.war" -o -name "*.jar" | head -20

      # Paso 5: Instala el Veracode CLI
      # Incluye el autopackager que detecta y empaqueta
      # correctamente el artefacto para Veracode
      - name: Instalar Veracode CLI
        run: |
          echo '[INFO] Descargando Veracode CLI...'
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          ./veracode version
          echo '[INFO] Veracode CLI instalado correctamente.'

      # Paso 6: Diagnóstico del proyecto
      # Detecta los toolchains disponibles
      # Ahora que el .war existe, detectará Java/Maven
      # Genera o actualiza veracode.yml con los módulos
      # SIEMPRE ejecutar antes de veracode package
      - name: Veracode Package Discover
        run: |
          echo '[INFO] Detectando toolchains del proyecto...'
          ./veracode package discover
          echo '[INFO] Diagnóstico completado.'

      # Paso 7: Empaqueta el proyecto con el autopackager
      # Con el .war ya compilado, el autopackager detecta
      # correctamente Java y genera el artefacto para Veracode
      # --source .: empaqueta desde el directorio raíz
      # --trust: confirma que el código es de confianza
      # --output ./dist: carpeta de salida del artefacto
      - name: Veracode Autopackage
        run: |
          echo '[INFO] Empaquetando proyecto...'
          ./veracode package \
            --source . \
            --trust \
            --output ./dist \
            --verbose
          echo '[INFO] Artefactos generados por el autopackager:'
          ls -la ./dist/

      # Paso 8: Sube el artefacto para el job de scan
      # El autopackager genera nombres tipo:
      # veracode-auto-pack-{proyecto}-{lenguaje}.zip
      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: veracode-autopack-artifact
          path: ./dist/*.zip

  # ══════════════════════════════════════════
  # JOB 2: VERACODE PIPELINE SCAN
  # Descarga el artefacto autoempaquetado
  # y lo envía a Veracode para análisis SAST
  # ══════════════════════════════════════════
  veracode-scan:
    needs: autopackage                # Espera que autopackage termine
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descarga el artefacto del job anterior
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: veracode-autopack-artifact

      # Paso 2: Lista los archivos descargados
      - name: Listar archivos descargados
        run: |
          echo '[INFO] Archivos disponibles para escanear:'
          ls -la

      # Paso 3: Instala Java para ejecutar pipeline-scan.jar
      # Cada job corre en runner limpio — Java se reinstala
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # Paso 4: Ejecuta el Pipeline Scan de Veracode
      # --fail_on_severity: bloquea el pipeline si encuentra
      #   Very High o High — quitar esta línea para modo pasivo
      # --json_output_file: guarda todos los findings
      # --filtered_json_output_file: solo los que violan política
      - name: Veracode Pipeline Scan
        env:
          VID: ${{ secrets.VID }}     # API ID de Veracode
          VKEY: ${{ secrets.VKEY }}   # API Secret Key de Veracode
        run: |
          echo '[INFO] Descargando Pipeline Scanner...'
          curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
          unzip pipeline-scan-LATEST.zip

          # Listar ZIPs disponibles para diagnóstico
          echo '[INFO] Archivos ZIP disponibles:'
          ls -la *.zip

          # Detectar el ZIP del artefacto — excluye pipeline-scan-LATEST.zip
          ZIP_FILE=$(ls *.zip | grep -v "pipeline-scan" | head -1)

          # Validar que se encontró el artefacto
          if [ -z "$ZIP_FILE" ]; then
            echo '[ERROR] No se encontró artefacto ZIP para escanear'
            echo '[ERROR] Verificar que el job autopackage generó el artefacto'
            exit 1
          fi

          echo "[INFO] Artefacto a escanear: $ZIP_FILE"

          echo '[INFO] Ejecutando Pipeline Scan...'
          java -jar pipeline-scan.jar \
            -vid "$VID" \
            -vkey "$VKEY" \
            --file "$ZIP_FILE" \
            --project_name "$GITHUB_REPOSITORY" \
            --project_url "https://github.com/$GITHUB_REPOSITORY" \
            --fail_on_severity "Very High, High" \
            --json_output_file results.json \
            --filtered_json_output_file filtered_results.json

          echo '[INFO] Verificando archivos JSON generados...'
          ls -la *.json || echo '[WARN] No se generaron archivos JSON'
          echo '[INFO] Pipeline Scan completado.'

      # Paso 5: Guarda resultados como artefacto descargable
      # if: always() garantiza guardado aunque el scan falle
      # results.json: todos los findings
      # filtered_results.json: solo los que violan la política
      - name: Guardar resultados del scan
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-scan-results
          path: |
            results.json
            filtered_results.json
